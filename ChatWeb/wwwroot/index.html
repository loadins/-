<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nexus Web</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loginPage">
  <div class="box">
    <h1>Nexus Chat</h1>
    <input id="loginUser" placeholder="Логин">
    <input id="loginPass" type="password" placeholder="Пароль">
    <div class="btns">
      <button onclick="login()">Войти</button>
      <button onclick="register()">Регистрация</button>
    </div>
    <div id="loginError" class="error"></div>
  </div>
</div>
<div id="chatPage" class="hidden">
  <div class="topbar">
    <span id="roomName">General</span>
    <span id="userName"></span>
    <a href="#" onclick="logout()">Выйти</a>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="section-title">Комнаты</div>
      <div id="roomList"></div>
      <div class="section-title">Участники</div>
      <div id="userList"></div>
      <div class="section-title">Мои файлы</div>
      <div id="fileList"></div>
      <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" id="fileInput" name="file">
        <button type="submit">Загрузить</button>
      </form>
    </div>
    <div class="chat-area">
      <div id="messages"></div>
      <div class="input-row">
        <input id="msgInput" placeholder="Сообщение..." autofocus>
        <button onclick="send()">></button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<script src="app.js"></script>
</body>
</html>
